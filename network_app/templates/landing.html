{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing - Monitor OS</title>
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .landing-container {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-deep);
            position: relative;
            overflow: hidden;
        }

        .landing-container::before,
        .landing-container::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(140px);
            z-index: 0;
            opacity: 0.25;
            pointer-events: none;
            animation: float 20s infinite alternate;
        }

        .landing-container::before {
            background: var(--accent-green);
            top: -200px;
            right: -100px;
        }

        .landing-container::after {
            background: var(--accent-green-light);
            bottom: -200px;
            left: -100px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(60px, 60px);
            }
        }

        .landing-card {
            width: 100%;
            max-width: 500px;
            padding: 3.5rem;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
            border-radius: 32px;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-ring {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            background: rgba(51, 153, 51, 0.1);
            border: 1px solid rgba(51, 153, 51, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2.5rem;
            color: var(--accent-green);
            transform: rotate(-10deg);
        }

        .landing-title {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
            letter-spacing: -1.5px;
            color: white;
        }

        .landing-subtitle {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .landing-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 1.2rem 1.8rem;
            border-radius: 18px;
            color: white;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }

        .landing-input:focus {
            outline: none;
            border-color: var(--accent-green);
            background: rgba(51, 153, 51, 0.05);
            box-shadow: 0 0 20px rgba(51, 153, 51, 0.15);
        }

        .start-btn {
            width: 100%;
            background: var(--accent-green);
            color: #0c1409;
            border: none;
            padding: 1.2rem;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            transition: all 0.2s ease;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(51, 153, 51, 0.3);
            filter: brightness(1.1);
        }

        .hint {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .landing-card {
                padding: 2rem;
                margin: 1rem;
                border-radius: 20px;
                max-width: calc(100% - 2rem);
            }

            .landing-title {
                font-size: 2.2rem;
            }

            .start-btn {
                padding: 1rem;
                font-size: 1rem;
            }

            .landing-input {
                padding: 1rem 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="landing-container">
        <div class="landing-card glass-panel">
            <div class="logo-ring">
                <i data-lucide="shield" style="width: 40px; height: 40px;"></i>
            </div>
            <h1 class="landing-title">Network Monitor</h1>

            <form action="{% url 'dashboard' %}" method="GET">
                <div class="input-group">
                    <input type="text" name="network" class="landing-input"
                        placeholder="Enter Target Network (e.g. 192.168.1.0/24)" required autofocus>
                </div>
                <button type="submit" class="start-btn">
                    Launch Dashboard <i data-lucide="arrow-right" style="width: 20px; height: 20px;"></i>
                </button>
            </form>

            <p class="hint">Supports single IP addresses</p>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>

</html>
