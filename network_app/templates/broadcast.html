{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcast - Monitor OS</title>
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .dashboard-page {
            display: flex; width: 100%; height: 100vh; overflow: hidden; background: var(--bg-deep); position: relative;
        }
        .sidebar {
            width: 80px; min-width: 80px; height: 100%; background: var(--glass-bg); backdrop-filter: var(--glass-blur); border-right: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); padding: 2.5rem 0.75rem; display: flex; flex-direction: column; gap: 1rem; position: relative; overflow: hidden; transition: width 0.1s ease;
        }
        .sidebar.expanded { width: 220px; min-width: 220px; }
        .sidebar-btn { background: transparent; color: var(--text-main); border: 1px solid transparent; padding: 1rem; border-radius: 16px; font-weight: 500; text-align: left; cursor: pointer; transition: all 0.1s ease; font-size: 0.95rem; display: flex; align-items: center; gap: 1.25rem; width: 100%; overflow: hidden; white-space: nowrap; text-decoration: none; }
        .sidebar-btn span { opacity: 0; transition: opacity 0.1s ease; }
        .sidebar.expanded .sidebar-btn span { opacity: 1; }
        .sidebar-btn:hover { background: var(--glass-bg-hover); border-color: rgba(51, 153, 51, 0.3); }
        .sidebar-btn.active { background: rgba(51, 153, 51, 0.12); border-color: var(--accent-green); color: var(--accent-green); }
        .header-toggle { display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; border-radius: 14px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); color: var(--text-main); cursor: pointer; transition: all 0.1s ease; flex-shrink: 0; }
        .main-wrapper { flex: 1; display: flex; flex-direction: column; height: 100%; padding: 1.5rem; gap: 1.5rem; overflow: hidden; position: relative; z-index: 1; }
        
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .page-title { font-size: 1.8rem; font-weight: 800; color: var(--text-main); display: flex; align-items: center; gap: 1rem; }
        .page-title i { color: var(--accent-green); }

        .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .tab-btn { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-muted); padding: 0.8rem 1.5rem; border-radius: 12px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; transition: all 0.2s; }
        .tab-btn:hover { background: var(--glass-bg-hover); color: var(--text-main); }
        .tab-btn.active { background: rgba(51,153,51,0.1); border-color: var(--accent-green); color: var(--accent-green); }

        .tab-content { display: none; flex-direction: column; gap: 1.5rem; overflow-y: auto; height: 100%; padding-bottom: 3rem; }
        .tab-content.active { display: flex; }

        .glass-panel-box { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2rem; box-shadow: var(--glass-shadow); }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.4rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-main); padding: 0.7rem; border-radius: 12px; font-family: inherit; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent-green); }
        
        .btn { background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--glass-border); padding: 0.7rem 1.5rem; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn:hover { background: var(--glass-bg-hover); }
        .btn-primary { background: rgba(51,153,51,0.2); border-color: var(--accent-green); color: var(--accent-green); }
        .btn-primary:hover { background: rgba(51,153,51,0.3); }

        /* Broadcast Feed */
        .feed-controls { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; }
        .search-bar { flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 12px; padding: 0.7rem 1.2rem; color: var(--text-main); }
        
        .broadcast-card { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 16px; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; transition: all 0.2s; }
        .broadcast-card:hover { transform: translateY(-2px); border-color: var(--accent-green); }
        .bc-header { display: flex; justify-content: space-between; align-items: center; }
        .bc-title { font-weight: 700; color: var(--text-main); font-size: 1.1rem; }
        .bc-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 1rem; }
        .bc-body { color: #e2e8f0; font-size: 0.95rem; line-height: 1.5; }
        
        .badge { padding: 0.3rem 0.6rem; border-radius: 8px; font-size: 0.75rem; font-weight: 700; border: 1px solid; }
        .badge-open { background: rgba(239,68,68,0.1); border-color: var(--accent-red); color: var(--accent-red); }
        .badge-inv { background: rgba(245,158,11,0.1); border-color: var(--accent-orange); color: var(--accent-orange); }
        .badge-res { background: rgba(51,153,51,0.1); border-color: var(--accent-green); color: var(--accent-green); }

        .severity-low { color: var(--accent-blue); }
        .severity-medium { color: var(--accent-green); }
        .severity-high { color: var(--accent-orange); }
        .severity-critical { color: var(--accent-red); font-weight: 800; }
    </style>
</head>
<body class="dashboard-page">
    <aside class="sidebar" id="sidebar">
        <div style="font-size: 1.2rem; font-weight: 700; margin-bottom: 2rem; padding-left: 0.5rem; display: flex; align-items: center; gap: 20px; overflow: hidden; height: 60px; padding: 0 0.5rem;">
            <button class="header-toggle" onclick="toggleSidebar()">
                <i data-lucide="menu" style="width: 20px; height: 20px;"></i>
            </button>
            <span id="sidebar-title" style="opacity: 0; transition: opacity 0.2s 0.1s ease; white-space: nowrap; visibility: hidden;">
                Network Monitor
            </span>
        </div>
        <a class="sidebar-btn" href="{% url 'dashboard' %}"><i data-lucide="layout-dashboard" style="width: 20px; height: 20px; flex-shrink: 0;"></i><span>Dashboard</span></a>
        <a class="sidebar-btn" href="{% url 'network_map' %}"><i data-lucide="network" style="width: 20px; height: 20px; flex-shrink: 0;"></i><span>Network Map</span></a>
        <a class="sidebar-btn" href="{% url 'security_logs' %}"><i data-lucide="shield-alert" style="width: 20px; height: 20px; flex-shrink: 0;"></i><span>Security Logs</span></a>
        <a class="sidebar-btn active" href="{% url 'broadcast' %}"><i data-lucide="radio" style="width: 20px; height: 20px; flex-shrink: 0;"></i><span>Broadcast</span></a>
        <a class="sidebar-btn" href="{% url 'settings' %}"><i data-lucide="settings" style="width: 20px; height: 20px; flex-shrink: 0;"></i><span>Settings</span></a>
        <div style="margin-top: auto;"><a href="{% url 'logout' %}" style="text-decoration: none;"><button class="sidebar-btn"><i data-lucide="log-out" style="width: 20px; height: 20px; flex-shrink: 0;"></i><span>Exit</span></button></a></div>
    </aside>

    <div class="main-wrapper">
        <div class="page-header">
            <div class="page-title"><i data-lucide="radio" style="width:28px;height:28px;"></i> Broadcast Center</div>
            <div style="display:flex; align-items:center; gap:1rem;">
                <span id="unreadBadge" style="background:var(--accent-red); color:#fff; padding:0.2rem 0.6rem; border-radius:10px; font-size:0.8rem; font-weight:700; display:none;">0 Unread</span>
                <button class="btn" onclick="exportCSV()"><i data-lucide="download" style="width:16px;height:16px;"></i> Export CSV</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('watch')"><i data-lucide="activity" style="width:18px;height:18px;"></i> Watch Broadcasts</button>
            <button class="tab-btn" onclick="switchTab('add')"><i data-lucide="plus-circle" style="width:18px;height:18px;"></i> Add Notes & Broadcast</button>
        </div>

        <!-- TAB 1: Add Notes & Broadcast -->
        <div id="tab-add" class="tab-content">
            <div class="glass-panel-box" style="max-width: 800px; margin: 0 auto; width: 100%;">
                <form id="noteForm" onsubmit="saveNote(event)">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                        <div class="form-group">
                            <label>Incident Title</label>
                            <input type="text" id="incTitle" required placeholder="e.g. Unusual login attempts">
                        </div>
                        <div class="form-group">
                            <label>Incident ID</label>
                            <input type="text" id="incId" required placeholder="INC-2026-001">
                        </div>
                        <div class="form-group">
                            <label>Assigned To</label>
                            <input type="text" id="incAssign" required value="{{ username }}">
                        </div>
                        <div class="form-group">
                            <label>Severity</label>
                            <select id="incSev">
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                                <option value="Critical">Critical</option>
                            </select>
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Status</label>
                            <select id="incStatus">
                                <option value="Open">Open</option>
                                <option value="Investigating">Investigating</option>
                                <option value="Resolved">Resolved</option>
                            </select>
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Notes / Message</label>
                            <textarea id="incNotes" rows="5" required placeholder="Enter incident notes or broadcast message..."></textarea>
                        </div>
                    </div>
                    <div style="display:flex; gap:1rem; margin-top:1rem;">
                        <button type="submit" class="btn"><i data-lucide="save" style="width:18px;height:18px;"></i> Save Note</button>
                        <button type="button" class="btn btn-primary" onclick="broadcastMessage()"><i data-lucide="radio" style="width:18px;height:18px;"></i> Broadcast Message</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- TAB 2: Watch Broadcasts -->
        <div id="tab-watch" class="tab-content active">
            <div class="feed-controls">
                <input type="text" id="searchBroadcast" class="search-bar" placeholder="Search broadcasts..." onkeyup="filterBroadcasts()">
                <select id="filterStatus" class="search-bar" style="flex:0.3" onchange="filterBroadcasts()">
                    <option value="All">All Statuses</option>
                    <option value="Open">Open</option>
                    <option value="Investigating">Investigating</option>
                    <option value="Resolved">Resolved</option>
                </select>
            </div>
            
            <div id="broadcastFeed" style="display:flex; flex-direction:column; gap:1rem;">
                <div style="color:var(--text-muted); text-align:center; padding:2rem;">Loading broadcasts...</div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let sidebarExpanded = false;
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebarExpanded = !sidebarExpanded;
            sidebar.classList.toggle('expanded', sidebarExpanded);
            const title = document.getElementById('sidebar-title');
            if (sidebarExpanded) {
                title.style.visibility = 'visible'; title.style.opacity = '1';
            } else {
                title.style.opacity = '0'; setTimeout(() => { if (!sidebarExpanded) title.style.visibility = 'hidden'; }, 200);
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            if(tab === 'watch') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('tab-watch').classList.add('active');
                markRead();
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('tab-add').classList.add('active');
            }
        }

        let allBroadcasts = [];
        let unreadCount = 0;
        let lastId = 0;

        function getStatusBadge(status) {
            if(status === 'Open') return '<span class="badge badge-open">Open</span>';
            if(status === 'Investigating') return '<span class="badge badge-inv">Investigating</span>';
            if(status === 'Resolved') return '<span class="badge badge-res">Resolved</span>';
            return '<span class="badge">' + status + '</span>';
        }

        function getSeverityClass(sev) {
            if(sev === 'Low') return 'severity-low';
            if(sev === 'Medium') return 'severity-medium';
            if(sev === 'High') return 'severity-high';
            if(sev === 'Critical') return 'severity-critical';
            return '';
        }

        async function fetchBroadcasts() {
            try {
                const res = await fetch('http://127.0.0.1:5000/api/broadcast_messages');
                const data = await res.json();
                allBroadcasts = data;
                
                if(data.length > 0 && data[0].id > lastId) {
                    if(lastId !== 0 && !document.getElementById('tab-watch').classList.contains('active')) {
                        unreadCount += (data[0].id - lastId);
                        updateBadge();
                    }
                    lastId = data[0].id;
                }
                
                filterBroadcasts();
            } catch(e) {
                console.error('Failed to fetch broadcasts', e);
            }
        }

        function updateBadge() {
            const b = document.getElementById('unreadBadge');
            if(unreadCount > 0) {
                b.style.display = 'block';
                b.innerText = unreadCount + ' Unread';
            } else {
                b.style.display = 'none';
            }
        }

        function markRead() {
            unreadCount = 0;
            updateBadge();
        }

        function filterBroadcasts() {
            const q = document.getElementById('searchBroadcast').value.toLowerCase();
            const s = document.getElementById('filterStatus').value;
            
            const filtered = allBroadcasts.filter(b => {
                const matchQ = b.message.toLowerCase().includes(q) || b.incident_id.toLowerCase().includes(q) || b.sender.toLowerCase().includes(q);
                const matchS = s === 'All' || b.status === s;
                return matchQ && matchS;
            });
            
            const container = document.getElementById('broadcastFeed');
            if(filtered.length === 0) {
                container.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding:2rem;">No broadcasts found.</div>';
                return;
            }
            
            container.innerHTML = filtered.map(b => `
                <div class="broadcast-card">
                    <div class="bc-header">
                        <div class="bc-title ${getSeverityClass(b.severity)}">[${b.severity}] Incident ${b.incident_id}</div>
                        ${getStatusBadge(b.status)}
                    </div>
                    <div class="bc-body">${b.message}</div>
                    <div class="bc-meta">
                        <span><i data-lucide="user" style="width:14px;height:14px;display:inline-block;vertical-align:middle;"></i> ${b.sender}</span>
                        <span><i data-lucide="clock" style="width:14px;height:14px;display:inline-block;vertical-align:middle;"></i> ${b.timestamp}</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function saveNote(e) {
            e.preventDefault();
            const payload = {
                incident_title: document.getElementById('incTitle').value,
                incident_id: document.getElementById('incId').value,
                assigned_to: document.getElementById('incAssign').value,
                severity: document.getElementById('incSev').value,
                status: document.getElementById('incStatus').value,
                notes: document.getElementById('incNotes').value
            };
            try {
                const res = await fetch('http://127.0.0.1:5000/api/broadcast_notes', {
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(data.success) {
                    alert('Note saved to incident log.');
                }
            } catch(err) { alert('Error saving note.'); }
        }

        async function broadcastMessage() {
            const payload = {
                severity: document.getElementById('incSev').value,
                sender: '{{ username }}',
                message: document.getElementById('incNotes').value,
                incident_id: document.getElementById('incId').value,
                status: document.getElementById('incStatus').value
            };
            if(!payload.message || !payload.incident_id) return alert('Please enter Incident ID and Message.');
            
            try {
                const res = await fetch('http://127.0.0.1:5000/api/broadcast_messages', {
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(data.success) {
                    alert('Message broadcasted to network!');
                    fetchBroadcasts();
                    switchTab('watch');
                }
            } catch(err) { alert('Error broadcasting.'); }
        }

        function exportCSV() {
            if(allBroadcasts.length === 0) return alert('No data to export.');
            let csv = 'ID,Severity,Sender,Message,IncidentID,Status,Timestamp\n';
            allBroadcasts.forEach(b => {
                csv += `${b.id},${b.severity},${b.sender},"${b.message.replace(/"/g, '""')}",${b.incident_id},${b.status},${b.timestamp}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'broadcasts.csv');
            a.click();
        }

        setInterval(fetchBroadcasts, 10000);
        fetchBroadcasts();
    </script>
</body>
</html>
